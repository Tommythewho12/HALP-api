openapi: "3.1.0"
info:
    title: Halp API
    version: 0.1.0

tags:
    - name: auth
      description: operations requiring authenticated user
    - name: team
      description: operations creating, reading, updating, or deleting teams
    - name: event
      description: operations creating, reading, updating, or deleting events
    - name: admin
      description: operations operations allowed to team administrators only

paths:
    /signup:
        post:
            summary: creates a new user
            # add a description with password requirements
            operationId: createUserId
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/UserCreateRequestSchema"
            responses:
                "201":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/UserSchema"
                "default":
                    $ref: "#/components/responses/DefaultErrorResponse"

    /login:
        post:
            summary: authenticates a user
            description: authenticates the user with the provided password hash and returns an access-token as well as a refresh-token. The access token has an expiration time of 5 minutes, the refresh token has an expiration time of 90 days.
            operationId: loginUserId
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/LoginRequestSchema"
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AccessTokenResponseSchema"
                "default":
                    $ref: "#/components/responses/DefaultErrorResponse"

    /logout:
        post:
            summary: invalidates access tokens
            operationId: logoutUserId
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/LogoutRequestSchema"
            responses:
                "200":
                    $ref: "#/components/responses/DefaultSuccessResponse"
                "default":
                    $ref: "#/components/responses/DefaultErrorResponse"

    /refresh-token:
        parameters:
            - name: refreshToken
              in: cookie
              required: true
              schema:
                  type: string
        get:
            # TODO also represent the cookie returned
            summary: refreshes access-token with provided refresh-token
            operationId: refreshTokenId
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AccessTokenResponseSchema"
                "default":
                    $ref: "#/components/responses/DefaultErrorResponse"

    # TODO add /reset-password:

    /auth/change-password:
        parameters:
            - $ref: "#/components/parameters/AccessTokenParameter"
        patch:
            summary: update user password
            operationId: updatePasswordId
            tags:
                - auth
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/PasswordChangeRequestSchema"
            responses:
                "200":
                    $ref: "#/components/responses/DefaultSuccessResponse"
                "default":
                    $ref: "#/components/responses/DefaultErrorResponse"

    /auth/user:
        parameters:
            - $ref: "#/components/parameters/AccessTokenParameter"
        get:
            summary: get logged in user info
            operationId: getUserInfoId
            tags:
                - auth
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/UserSchema"
                "default":
                    $ref: "#/components/responses/DefaultErrorResponse"

    /auth/teams:
        parameters:
            - $ref: "#/components/parameters/AccessTokenParameter"
        post:
            summary: create team
            operationId: createTeamId
            tags:
                - auth
                - team
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/TeamCreateRequestSchema"
            responses:
                "201":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/TeamSchema"
                "default":
                    $ref: "#/components/responses/DefaultErrorResponse"
        get:
            summary: get teams
            operationId: getTeamsId
            tags:
                - auth
                - team
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                contains:
                                    type: object
                                    properties:
                                        teams:
                                            type: array
                                            items:
                                                $ref: "#/components/schemas/TeamEnrichedSchema"
                "default":
                    $ref: "#/components/responses/DefaultErrorResponse"

    /auth/teams/{teamId}:
        parameters:
            - $ref: "#/components/parameters/AccessTokenParameter"
            - $ref: "#/components/parameters/TeamIdParameter"
        delete:
            summary: delete team
            operationId: deleteTeamId
            tags:
                - auth
                - team
            responses:
                "200":
                    $ref: "#/components/responses/DefaultSuccessResponse"
                "default":
                    $ref: "#/components/responses/DefaultErrorResponse"

    /auth/teams/{teamId}/subscribers:
        parameters:
            - $ref: "#/components/parameters/AccessTokenParameter"
            - $ref: "#/components/parameters/TeamIdParameter"
        post:
            summary: subscribe logged in user to team
            operationId: subscribeToTeamId
            tags:
                - auth
                - team
            responses:
                "200":
                    $ref: "#/components/responses/DefaultSuccessResponse"
                "default":
                    $ref: "#/components/responses/DefaultErrorResponse"
        delete:
            summary: unsubscribe logged in user from team
            operationId: unsubscribeFromTeamId
            tags:
                - auth
                - team
            responses:
                "200":
                    $ref: "#/components/responses/DefaultSuccessResponse"
                "default":
                    $ref: "#/components/responses/DefaultErrorResponse"

    /auth/teams/{teamId}/events:
        parameters:
            - $ref: "#/components/parameters/AccessTokenParameter"
            - $ref: "#/components/parameters/TeamIdParameter"
        post:
            summary: create event
            operationId: createEventId
            tags:
                - auth
                - event
                - admin
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/EventCreateRequestSchema"
            responses:
                "201":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/EventSchema"
                "default":
                    $ref: "#/components/responses/DefaultErrorResponse"

    /auth/teams/{teamId}/events/{eventId}:
        parameters:
            - $ref: "#/components/parameters/AccessTokenParameter"
            - $ref: "#/components/parameters/TeamIdParameter"
            - $ref: "#/components/parameters/EventIdParameter"
        get:
            summary: get managed event
            operationId: getEventManagedId
            tags:
                - auth
                - event
                - admin
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/EventManagedSchema"
        delete:
            summary: delete event
            operationId: deleteEventId
            tags:
                - auth
                - event
                - admin
            responses:
                "200":
                    $ref: "#/components/responses/DefaultSuccessResponse"
                "default":
                    $ref: "#/components/responses/DefaultErrorResponse"

    /auth/teams/{teamId}/events/{eventId}/jobs:
        parameters:
            - $ref: "#/components/parameters/AccessTokenParameter"
            - $ref: "#/components/parameters/TeamIdParameter"
            - $ref: "#/components/parameters/EventIdParameter"
        post:
            summary: create job
            operationId: createJobId
            tags:
                - auth
                - event
                - admin
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/JobCreateRequestSchema"
            responses:
                "201":
                    $ref: "#/components/responses/JobSchema"
                "default":
                    $ref: "#/components/responses/DefaultErrorResponse"

    /auth/teams/{teamId}/events/{eventId}/jobs/{jobId}:
        parameters:
            - $ref: "#/components/parameters/AccessTokenParameter"
            - $ref: "#/components/parameters/TeamIdParameter"
            - $ref: "#/components/parameters/EventIdParameter"
            - $ref: "#/components/parameters/JobIdParameter"
        delete:
            summary: delete job
            operationId: deleteJobId
            tags:
                - auth
                - event
                - admin
            responses:
                "200":
                    $ref: "#/components/responses/DefaultSuccessResponse"
                "default":
                    $ref: "#/components/responses/DefaultErrorResponse"
        patch:
            summary: reassign job
            operationId: reassignJobId
            tags:
                - auth
                - event
                - admin
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/JobReassignRequestSchema"
            responses:
                "200":
                    $ref: "#/components/responses/DefaultSuccessResponse"
                "default":
                    $ref: "#/components/responses/DefaultErrorResponse"

    /auth/events:
        parameters:
            - $ref: "#/components/parameters/AccessTokenParameter"
        get:
            summary: get events
            operationId: getEventsId
            tags:
                - auth
                - event
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                contains:
                                    type: object
                                    properties:
                                        events:
                                            type: array
                                            items:
                                                $ref: "#/components/schemas/EventEnrichedSchema"
                "default":
                    $ref: "#/components/responses/DefaultErrorResponse"

    /auth/events/{eventId}:
        parameters:
            - $ref: "#/components/parameters/AccessTokenParameter"
            - $ref: "#/components/parameters/EventIdParameter"
        get:
            summary: get event
            operationId: getEventId
            tags:
                - auth
                - event
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/EventDetailedSchema"
                "default":
                    $ref: "#/components/responses/DefaultErrorResponse"

    /auth/events/{eventId}/volunteers:
        parameters:
            - $ref: "#/components/parameters/AccessTokenParameter"
            - $ref: "#/components/parameters/EventIdParameter"
        post:
            summary: volunteer for event
            operationId: volunteerForEventId
            tags:
                - auth
                - event
            responses:
                "201":
                    $ref: "#/components/responses/DefaultSuccessResponse"
                "default":
                    $ref: "#/components/responses/DefaultErrorResponse"
        delete:
            summary: unvolunteer from event
            operationId: unvolunteerFromEventId
            tags:
                - auth
                - event
            responses:
                "200":
                    $ref: "#/components/responses/DefaultSuccessResponse"
                "default":
                    $ref: "#/components/responses/DefaultErrorResponse"

components:
    parameters:
        AccessTokenParameter:
            name: Authorization
            in: header
            required: true
            schema:
                type: string
                # TODO add regex to match 'Bearer .+'
        TeamIdParameter:
            name: teamId
            in: path
            required: true
            schema:
                type: string
        EventIdParameter:
            name: eventId
            in: path
            required: true
            schema:
                type: string
        VolunteerIdParameter:
            name: volunteerId
            in: path
            required: true
            schema:
                type: string
        JobIdParameter:
            name: jobId
            in: path
            required: true
            schema:
                type: string

    # TODO standardize paths:

    responses:
        DefaultSuccessResponse:
            description: OK
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/DefaultSuccessResponseSchema"
        DefaultErrorResponse:
            description: Error
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/DefaultErrorResponseSchema"

    schemas:
        # request body schemas
        UserCreateRequestSchema:
            type: object
            properties:
                displayName:
                    type: string
                email:
                    type: string
                password:
                    type: string
                    format: password
            required:
                - displayName
                - email
                - password
        LoginRequestSchema:
            type: object
            properties:
                email:
                    type: string
                password:
                    type: string
                    format: password
            required:
                - email
                - password
        LogoutRequestSchema:
            type: object
            properties:
                email:
                    type: string
            required:
                - email
        PasswordChangeRequestSchema:
            type: object
            properties:
                oldPassword:
                    type: string
                    format: password
                newPassword:
                    type: string
                    format: password
            required:
                - oldPassword
                - newPassword
        TeamCreateRequestSchema:
            type: object
            properties:
                teamName:
                    type: string
            required:
                - teamName
        EventCreateRequestSchema:
            type: object
            properties:
                name:
                    type: string
                dateTime:
                    type: number
                description:
                    type: string
            required:
                - name
                - dateTime
        JobCreateRequestSchema:
            type: object
            properties:
                jobType:
                    type: string
            required:
                - jobType
        JobReassignRequestSchema:
            type: object
            properties:
                volunteerId:
                    type: string

        # response body schemas
        DefaultSuccessResponseSchema:
            type: object
            properties:
                message:
                    type: string
            required:
                - message
        DefaultErrorResponseSchema:
            type: object
            properties:
                errorMessage:
                    type: string
            required:
                - errorMessage
        AccessTokenResponseSchema:
            type: object
            properties:
                accessToken:
                    type: string
            required:
                - accessToken
        UserSchema:
            type: object
            properties:
                id:
                    type: string
                displayName:
                    type: string
                email:
                    type: string
            required:
                - id
                - displayName
                - email
        UserOptionalSchema:
            type: object
            properties:
                id:
                    type: string
                displayName:
                    type: string
                email:
                    type: string
        TeamEnrichedSchema:
            type: object
            properties:
                id:
                    type: string
                adminId:
                    type: string
                name:
                    type: string
                isSubscribed:
                    type: boolean
                isAdmin:
                    type: boolean
            required:
                - id
                - adminId
                - name
                - isSubscribed
                - isAdmin
        EventManagedSchema:
            type: object
            properties:
                event:
                    $ref: "#/components/schemas/EventSchema"
                volunteers:
                    type: array
                    items:
                        $ref: "#/components/schemas/UserSchema"
                jobs:
                    type: array
                    minItems: 1
                    items:
                        $ref: "#/components/schemas/JobEnrichedSchema"
            required:
                - event
        EventsResponseSchema:
            type: object
            properties:
                events:
                    type: array
                    items:
                        $ref: "#/components/schemas/EventEnrichedSchema"
            required:
                - events

        # default
        TeamSchema:
            type: object
            properties:
                id:
                    type: string
                adminId:
                    type: string
                name:
                    type: string
            required:
                - id
                - adminId
                - name
        EventSchema:
            type: object
            properties:
                id:
                    type: string
                teamId:
                    type: string
                name:
                    type: string
                description:
                    type: string
                startDatetime:
                    type: number
            required:
                - id
                - teamId
                - name
                - startDatetime
        EventEnrichedSchema:
            type: object
            properties:
                id:
                    type: string
                teamId:
                    type: string
                name:
                    type: string
                description:
                    type: string
                startDatetime:
                    type: number
                isVolunteering:
                    type: boolean
                isAssigned:
                    type: boolean
            required:
                - id
                - teamId
                - name
                - description
                - startDatetime
                - isVolunteering
                - isAdmin
        EventDetailedSchema:
            type: object
            properties:
                admin:
                    $ref: "#/components/schemas/UserSchema"
                team:
                    $ref: "#/components/schemas/TeamSchema"
                event:
                    $ref: "#/components/schemas/EventEnrichedSchema"
                jobs:
                    type: array
                    items:
                        $ref: "#/components/schemas/JobEnrichedSchema"
            required:
                - admin
                - team
                - event
        JobCreatorSchema:
            type: object
            properties:
                jobName:
                    type: string
                count:
                    type: number
                    # TODO positive interger, ...
            required:
                - jobName
                - count
        JobSchema:
            type: object
            properties:
                id:
                    type: string
                eventId:
                    type: string
                type:
                    type: string
                assigneeId:
                    type: string
            required:
                - id
                - eventId
                - type
        JobEnrichedSchema:
            type: object
            properties:
                id:
                    type: string
                eventId:
                    type: string
                type:
                    type: string
                assignee:
                    $ref: "#/components/schemas/UserOptionalSchema"
            required:
                - id
                - eventId
                - type
